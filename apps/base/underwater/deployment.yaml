apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecr-app-underwater
  namespace: underwater
  labels:
    app: octopus-underwater-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octopus-underwater-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: octopus-underwater-app
    spec:
      serviceAccountName: underwater-app
      containers:
        - name: octopus-underwater-app
          image: 495905914919.dkr.ecr.us-east-1.amazonaws.com/underwater:dev-23
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
