apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/underwater
  - ../../base/auth-service
  - ../../base/api-service

# Dev-specific patches
patches:
  # Scale down replicas in dev to save cost
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: ecr-app-underwater

  # Override image tag filter to only pull dev-* images
  - patch: |-
      - op: replace
        path: /spec/filterTags/pattern
        value: "^dev-[0-9]+"
    target:
      kind: ImagePolicy
      name: underwater

  # Smaller resource limits in dev
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
    target:
      kind: Deployment
      name: ecr-app-underwater

commonLabels:
  environment: dev
